<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Selector | KU Automation</title>
    <meta name="description" content="Find the perfect deployment option for your AI automation solution. Answer a few questions and get a personalized recommendation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #3182ce;
            --accent-light: #63b3ed;
            --success: #38a169;
            --success-light: #68d391;
            --warning: #dd6b20;
            --dark: #1a202c;
            --gray-900: #171923;
            --gray-700: #4a5568;
            --gray-500: #718096;
            --gray-300: #cbd5e0;
            --gray-100: #f7fafc;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-100);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--gradient);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--white);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .header-logo img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }
        
        .header-logo span {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .header-logo span em {
            font-style: normal;
            color: var(--accent-light);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }
        
        /* Container */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        
        /* Progress Bar */
        .progress-container {
            background: var(--white);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .progress-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.9rem;
        }
        
        .progress-step {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--gray-300);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--success) 100%);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        
        /* Question Card */
        .question-card {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-card h2 {
            font-size: 1.35rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .question-card .hint {
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        
        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .option {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border: 2px solid var(--gray-300);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--white);
        }
        
        .option:hover {
            border-color: var(--accent);
            background: rgba(49, 130, 206, 0.04);
        }
        
        .option.selected {
            border-color: var(--accent);
            background: rgba(49, 130, 206, 0.08);
        }
        
        .option-radio {
            width: 22px;
            height: 22px;
            border: 2px solid var(--gray-300);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .option.selected .option-radio {
            border-color: var(--accent);
            background: var(--accent);
        }
        
        .option.selected .option-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--white);
            border-radius: 50%;
        }
        
        .option-content h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.25rem;
        }
        
        .option-content p {
            font-size: 0.85rem;
            color: var(--gray-500);
            line-height: 1.5;
        }
        
        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.875rem 1.75rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
        }
        
        .btn-secondary:hover {
            background: var(--gray-300);
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }
        
        .btn-success {
            background: var(--success);
            color: var(--white);
        }
        
        .btn-success:hover {
            background: #2f855a;
        }
        
        /* Results */
        .results-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: fadeIn 0.4s ease;
        }
        
        .results-header {
            background: var(--gradient);
            color: var(--white);
            padding: 2rem;
            text-align: center;
        }
        
        .results-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .results-header p {
            opacity: 0.9;
        }
        
        .recommendation {
            padding: 2rem;
        }
        
        .rec-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--success) 0%, #2f855a 100%);
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        
        .rec-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .rec-subtitle {
            color: var(--gray-500);
            margin-bottom: 1.5rem;
        }
        
        .rec-features {
            background: var(--gray-100);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .rec-features h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }
        
        .feature-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--dark);
        }
        
        .feature-item::before {
            content: '✓';
            color: var(--success);
            font-weight: 700;
        }
        
        .rec-timeline {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .timeline-item {
            flex: 1;
            min-width: 140px;
            background: var(--gray-100);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }
        
        .timeline-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 0.25rem;
        }
        
        .timeline-item .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .rec-cta {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            color: var(--white);
        }
        
        .rec-cta h4 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        
        .rec-cta p {
            opacity: 0.9;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .rec-cta .btn {
            background: var(--white);
            color: var(--primary);
            font-weight: 700;
        }
        
        .rec-cta .btn:hover {
            background: var(--gray-100);
        }
        
        /* Alternative Options */
        .alternatives {
            padding: 1.5rem 2rem 2rem;
            border-top: 1px solid var(--gray-300);
        }
        
        .alternatives h4 {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin-bottom: 1rem;
        }
        
        .alt-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        
        .alt-option {
            background: var(--gray-100);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        
        .alt-option:hover {
            border-color: var(--accent);
            background: rgba(49, 130, 206, 0.08);
        }
        
        .alt-option .name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        
        .alt-option .match {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            
            .question-card, .results-card .recommendation, .alternatives {
                padding: 1.25rem;
            }
            
            .feature-list {
                grid-template-columns: 1fr;
            }
            
            .alt-options {
                grid-template-columns: 1fr;
            }
            
            .nav-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        /* Hidden state */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-logo">
        <img src="assets/logo.png" alt="KU Automation" onerror="this.style.display='none'">
        <span>KU<em>Automation</em></span>
    </div>
    <p>Find the perfect deployment option for your organisation</p>
</header>

<main class="container">
    <!-- Progress -->
    <div class="progress-container">
        <div class="progress-header">
            <span class="progress-label">Deployment Assessment</span>
            <span class="progress-step" id="stepIndicator">Question 1 of 5</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 20%"></div>
        </div>
    </div>
    
    <!-- Questions Container -->
    <div id="questionsContainer">
        <!-- Questions will be rendered here -->
    </div>
    
    <!-- Results Container -->
    <div id="resultsContainer" class="hidden">
        <!-- Results will be rendered here -->
    </div>
</main>

<script>
const questions = [
    {
        id: 'data_sensitivity',
        question: 'How sensitive is the data you\'ll be processing?',
        hint: 'Consider regulatory requirements and internal policies',
        options: [
            { value: 'low', label: 'Standard Business Data', description: 'General documents, non-confidential reports, public information' },
            { value: 'medium', label: 'Confidential Business Data', description: 'Internal reports, financial data, customer information' },
            { value: 'high', label: 'Highly Regulated Data', description: 'PII, health records, classified info, strict compliance requirements' },
            { value: 'critical', label: 'Air-Gapped / No External Access', description: 'Defence, critical infrastructure, zero external connectivity allowed' }
        ]
    },
    {
        id: 'cloud_policy',
        question: 'What\'s your organisation\'s cloud policy?',
        hint: 'Select the option that best matches your current IT policies',
        options: [
            { value: 'cloud_first', label: 'Cloud-First', description: 'We prefer SaaS solutions and public cloud services' },
            { value: 'cloud_approved', label: 'Approved Cloud Providers', description: 'We use cloud but only specific approved providers (AWS, Azure, GCP)' },
            { value: 'hybrid', label: 'Hybrid Approach', description: 'Some workloads in cloud, sensitive data stays on-premises' },
            { value: 'on_prem', label: 'On-Premises Only', description: 'All systems must run within our own data centres' }
        ]
    },
    {
        id: 'it_capacity',
        question: 'What\'s your IT team\'s capacity for new deployments?',
        hint: 'Be realistic about available resources',
        options: [
            { value: 'minimal', label: 'Minimal / No DevOps', description: 'Small team, prefer fully managed solutions' },
            { value: 'moderate', label: 'Some Capacity', description: 'Can handle setup with vendor support, prefer low maintenance' },
            { value: 'strong', label: 'Strong IT Team', description: 'Experienced DevOps, comfortable managing cloud infrastructure' },
            { value: 'enterprise', label: 'Enterprise IT', description: 'Dedicated teams, existing K8s/container platforms, full control preferred' }
        ]
    },
    {
        id: 'timeline',
        question: 'What\'s your deployment timeline?',
        hint: 'How quickly do you need the solution operational?',
        options: [
            { value: 'asap', label: 'As Soon As Possible', description: 'Days to 1 week — need to move fast' },
            { value: 'standard', label: '2-4 Weeks', description: 'Standard implementation with proper planning' },
            { value: 'planned', label: '1-2 Months', description: 'Part of a larger project with defined milestones' },
            { value: 'flexible', label: 'Flexible / Long-term', description: 'No rush — doing thorough evaluation' }
        ]
    },
    {
        id: 'compliance',
        question: 'What compliance requirements apply?',
        hint: 'Select all that apply or the most restrictive',
        options: [
            { value: 'standard', label: 'Standard Business', description: 'No specific regulatory requirements' },
            { value: 'gdpr', label: 'GDPR / Data Privacy', description: 'EU data protection, data residency requirements' },
            { value: 'regulated', label: 'Industry Regulated', description: 'SOC 2, ISO 27001, HIPAA, financial regulations' },
            { value: 'government', label: 'Government / Defence', description: 'Security clearance, government frameworks, FedRAMP' }
        ]
    }
];

const deploymentOptions = {
    saas: {
        name: 'KU Cloud (SaaS)',
        tagline: 'Fully managed, fastest deployment',
        features: ['Zero infrastructure', 'Automatic updates', 'Global CDN', '99.9% SLA', 'SOC 2 certified', '24/7 monitoring'],
        timeline: '1-3 days',
        itEffort: 'Minimal',
        bestFor: 'Teams wanting speed and simplicity'
    },
    private_cloud: {
        name: 'Private Cloud',
        tagline: 'Your VPC, our management',
        features: ['Your AWS/Azure/GCP', 'Data isolation', 'Custom encryption', 'VPC peering', 'Your compliance', 'Managed updates'],
        timeline: '2-3 weeks',
        itEffort: 'Moderate',
        bestFor: 'Enterprises with cloud infrastructure'
    },
    hybrid: {
        name: 'Hybrid Deployment',
        tagline: 'Cloud AI, local data',
        features: ['On-prem gateway', 'Data never leaves', 'Cloud AI power', 'Split processing', 'Best of both', 'Flexible scaling'],
        timeline: '2-4 weeks',
        itEffort: 'Moderate',
        bestFor: 'Data sovereignty with cloud benefits'
    },
    on_prem: {
        name: 'On-Premises',
        tagline: 'Full control, your infrastructure',
        features: ['Air-gap capable', 'Your hardware', 'Full audit control', 'Custom HSM', 'No external deps', 'Complete ownership'],
        timeline: '4-6 weeks',
        itEffort: 'Significant',
        bestFor: 'Regulated & high-security environments'
    }
};

let currentQuestion = 0;
let answers = {};

function renderQuestion(index) {
    const q = questions[index];
    const selectedValue = answers[q.id];
    
    document.getElementById('stepIndicator').textContent = `Question ${index + 1} of ${questions.length}`;
    document.getElementById('progressFill').style.width = `${((index + 1) / questions.length) * 100}%`;
    
    const html = `
        <div class="question-card">
            <h2>${q.question}</h2>
            <p class="hint">${q.hint}</p>
            <div class="options">
                ${q.options.map(opt => `
                    <div class="option ${selectedValue === opt.value ? 'selected' : ''}" data-value="${opt.value}" onclick="selectOption('${q.id}', '${opt.value}')">
                        <div class="option-radio"></div>
                        <div class="option-content">
                            <h3>${opt.label}</h3>
                            <p>${opt.description}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary ${index === 0 ? 'hidden' : ''}" onclick="prevQuestion()">
                    ← Back
                </button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" ${!selectedValue ? 'disabled' : ''}>
                    ${index === questions.length - 1 ? 'See Recommendation →' : 'Next →'}
                </button>
            </div>
        </div>
    `;
    
    document.getElementById('questionsContainer').innerHTML = html;
}

function selectOption(questionId, value) {
    answers[questionId] = value;
    
    // Update UI
    document.querySelectorAll('.option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.dataset.value === value) {
            opt.classList.add('selected');
        }
    });
    
    document.getElementById('nextBtn').disabled = false;
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion(currentQuestion);
    }
}

function nextQuestion() {
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion(currentQuestion);
    } else {
        showResults();
    }
}

function calculateRecommendation() {
    let scores = { saas: 0, private_cloud: 0, hybrid: 0, on_prem: 0 };
    
    // Data sensitivity scoring
    switch(answers.data_sensitivity) {
        case 'low': scores.saas += 4; scores.private_cloud += 2; break;
        case 'medium': scores.saas += 2; scores.private_cloud += 4; scores.hybrid += 3; break;
        case 'high': scores.private_cloud += 3; scores.hybrid += 4; scores.on_prem += 3; break;
        case 'critical': scores.on_prem += 5; break;
    }
    
    // Cloud policy scoring
    switch(answers.cloud_policy) {
        case 'cloud_first': scores.saas += 5; scores.private_cloud += 2; break;
        case 'cloud_approved': scores.private_cloud += 5; scores.saas += 2; scores.hybrid += 2; break;
        case 'hybrid': scores.hybrid += 5; scores.private_cloud += 2; break;
        case 'on_prem': scores.on_prem += 5; scores.hybrid += 1; break;
    }
    
    // IT capacity scoring
    switch(answers.it_capacity) {
        case 'minimal': scores.saas += 5; break;
        case 'moderate': scores.saas += 3; scores.private_cloud += 3; scores.hybrid += 2; break;
        case 'strong': scores.private_cloud += 4; scores.hybrid += 3; scores.on_prem += 2; break;
        case 'enterprise': scores.private_cloud += 3; scores.on_prem += 4; scores.hybrid += 2; break;
    }
    
    // Timeline scoring
    switch(answers.timeline) {
        case 'asap': scores.saas += 5; break;
        case 'standard': scores.saas += 3; scores.private_cloud += 3; scores.hybrid += 2; break;
        case 'planned': scores.private_cloud += 3; scores.hybrid += 3; scores.on_prem += 2; break;
        case 'flexible': scores.private_cloud += 2; scores.on_prem += 3; scores.hybrid += 2; break;
    }
    
    // Compliance scoring
    switch(answers.compliance) {
        case 'standard': scores.saas += 4; scores.private_cloud += 2; break;
        case 'gdpr': scores.private_cloud += 4; scores.hybrid += 3; scores.saas += 1; break;
        case 'regulated': scores.private_cloud += 4; scores.on_prem += 3; scores.hybrid += 2; break;
        case 'government': scores.on_prem += 5; scores.private_cloud += 1; break;
    }
    
    // Find recommendation
    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const maxScore = sorted[0][1];
    const total = Object.values(scores).reduce((a, b) => a + b, 0);
    
    return {
        recommended: sorted[0][0],
        matchPercent: Math.round((maxScore / total) * 100 * 1.5), // Amplify for display
        alternatives: sorted.slice(1, 4).map(([key, score]) => ({
            key,
            matchPercent: Math.round((score / total) * 100 * 1.5)
        }))
    };
}

function showResults() {
    const result = calculateRecommendation();
    const rec = deploymentOptions[result.recommended];
    
    // Cap match percent at 98
    const matchDisplay = Math.min(result.matchPercent, 98);
    
    document.getElementById('questionsContainer').classList.add('hidden');
    document.getElementById('resultsContainer').classList.remove('hidden');
    document.querySelector('.progress-container').classList.add('hidden');
    
    const alternativesHtml = result.alternatives.map(alt => {
        const opt = deploymentOptions[alt.key];
        return `
            <div class="alt-option" onclick="showAlternative('${alt.key}')">
                <div class="name">${opt.name}</div>
                <div class="match">${Math.min(alt.matchPercent, 95)}% match</div>
            </div>
        `;
    }).join('');
    
    document.getElementById('resultsContainer').innerHTML = `
        <div class="results-card">
            <div class="results-header">
                <h2>Your Deployment Recommendation</h2>
                <p>Based on your requirements and constraints</p>
            </div>
            <div class="recommendation">
                <span class="rec-badge">✓ ${matchDisplay}% Match</span>
                <h3 class="rec-title">${rec.name}</h3>
                <p class="rec-subtitle">${rec.tagline} — ${rec.bestFor}</p>
                
                <div class="rec-features">
                    <h4>What You Get</h4>
                    <div class="feature-list">
                        ${rec.features.map(f => `<div class="feature-item">${f}</div>`).join('')}
                    </div>
                </div>
                
                <div class="rec-timeline">
                    <div class="timeline-item">
                        <div class="label">Deployment Time</div>
                        <div class="value">${rec.timeline}</div>
                    </div>
                    <div class="timeline-item">
                        <div class="label">IT Effort</div>
                        <div class="value">${rec.itEffort}</div>
                    </div>
                </div>
                
                <div class="rec-cta">
                    <h4>Ready to move forward?</h4>
                    <p>Book a call with our team to discuss your deployment plan</p>
